"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
[ ÓúĎ ](bg:#a3aed2 fg:#090c0c)\
[Óāį](bg:#769ff0 fg:#a3aed2)\
$directory\
[Óāį](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[Óāį](fg:#394260 bg:#212736)\
$fill\
$nodejs\
$rust\
$python\
$pulumi\
$golang\
$nix_shell\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
truncate_to_repo = true
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[fill]
symbol = ' '

[pulumi]
format = '[$symbol$stack]($style) '

[git_branch]
symbol = "Ôźė"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "Óėß"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[nix_shell]
symbol = '‚ĚĄÔłŹ'
format = '[$symbol $state]($style) '
